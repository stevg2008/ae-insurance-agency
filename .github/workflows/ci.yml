name: CI — Build, Type, Lint, Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    name: Build · Type · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Prevents build from failing due to missing env vars in CI
          GHL_WEBHOOK_URL: https://example.com/placeholder
          NEXT_PUBLIC_SITE_URL: https://www.aeinsurancefl.com

  broken-links:
    name: Broken Link Check
    runs-on: ubuntu-latest
    # Only run on pushes to main (not every PR — link checks are slow)
    if: github.event_name == 'push'
    needs: build-and-check
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links in source files
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: yes
          config-file: .github/mlc_config.json
        continue-on-error: true

  sitemap-check:
    name: Sitemap & Robots Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sitemap source exists
        run: |
          if [ ! -f src/app/sitemap.ts ]; then
            echo "❌ src/app/sitemap.ts not found"
            exit 1
          fi
          echo "✅ sitemap.ts found"

      - name: Validate robots source exists
        run: |
          if [ ! -f src/app/robots.ts ] && [ ! -f public/robots.txt ]; then
            echo "❌ No robots.ts or robots.txt found"
            exit 1
          fi
          echo "✅ robots found"

      - name: Check sitemap for required pages
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('src/app/sitemap.ts', 'utf8');
          const required = ['/medicare', '/contact', '/about', '/blogs', '/watch'];
          let missing = [];
          for (const page of required) {
            if (!content.includes(page)) missing.push(page);
          }
          if (missing.length > 0) {
            console.error('❌ Missing pages from sitemap:', missing.join(', '));
            process.exit(1);
          }
          console.log('✅ All required pages present in sitemap');
          "
